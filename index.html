<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<title>Love ❤️</title>

<style>

/* GLOBAL */
body{
margin:0;
background:black;
font-family:sans-serif;
overflow:hidden;
}
.page{
display:none;
height:100vh;
width:100%;
justify-content:center;
align-items:center;
flex-direction:column;
position:absolute;
}
.active{display:flex;}

/* ===== SWIPE (FIXED ORIGINAL) ===== */
.swipe{
position:relative;
background:#F1F7F7;
width:200px;
height:60px;
border-radius:60px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}
.container{
position:absolute;
left:5px;
width:50px;
height:50px;
background:#7AB5B7;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
transition:0.3s;
}
.swipe:hover .container{
left:calc(100% - 55px);
}

/* ===== LOGIN (ORIGINAL STYLE BACK) ===== */
#Container{
display:flex;
justify-content:center;
align-items:center;
height:100%;
}
.form{
padding:20px;
border-radius:10px;
border:3px solid white;
background:rgba(0,255,240,0.5);
display:flex;
flex-direction:column;
gap:10px;
animation:float 2s infinite;
}
@keyframes float{
50%{transform:translateY(20px);}
}
.form input{
padding:10px;
border-radius:8px;
border:none;
}
.form button{
padding:10px;
background:linear-gradient(144deg,#9c11ff,#15efff);
border:none;
color:white;
}

/* ===== PHONE SCANNER (ORIGINAL) ===== */
.phoneContainer{
width:185px;
height:350px;
background:black;
border-radius:20px;
position:relative;
}
.screen{
width:100%;
height:100%;
position:absolute;
border-radius:20px;
overflow:hidden;
}
.camera{
width:80px;
height:20px;
background:black;
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
border-radius:25px;
animation:cam 2s infinite alternate;
}
@keyframes cam{
50%{width:100px;background:darkblue;}
}
.scanLine{
width:100%;
height:3px;
background:#00ffcc;
position:absolute;
animation:scan 2s infinite;
}
@keyframes scan{
0%{top:0;}
100%{top:100%;}
}

/* ===== LOADER ===== */
.loader{
color:white;
font-size:30px;
animation:blink 1s infinite;
}
@keyframes blink{
50%{opacity:0;}
}

/* ===== ENVELOPE (WORKING) ===== */
.envWrap{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}
.env{
width:120px;
height:80px;
background:#e95f55;
border-radius:6px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}
.env img{
width:90%;
height:90%;
object-fit:cover;
border-radius:5px;
}

/* POPUP */
#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}
#popup img{
width:80%;
max-width:300px;
border-radius:10px;
}

/* ===== FINAL PAGE (TAILWIND STYLE) ===== */
.card{
background:white;
padding:20px;
border-radius:20px;
text-align:center;
}

/* BUTTON */
.btn{
margin-top:15px;
padding:10px 20px;
background:#ff4d88;
border:none;
color:white;
border-radius:20px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="p1" class="page active">
<div class="swipe" onclick="go(2)">
Get Started
<span class="container">➡</span>
</div>
</div>

<!-- PAGE 2 -->
<div id="p2" class="page">
<div id="Container">
<form class="form" onsubmit="login(event)">
<input placeholder="UserName">
<input id="pass" type="password" placeholder="Password">
<button>Continue</button>
</form>
</div>
</div>

<!-- PAGE 3 -->
<div id="p3" class="page">
<div class="phoneContainer">
<div class="screen">
<div class="camera"></div>
<div class="scanLine"></div>
</div>
</div>
</div>

<!-- PAGE 4 -->
<div id="p4" class="page">
<div class="loader">Loading...</div>
</div>

<!-- PAGE 5 -->
<div id="p5" class="page">
<div class="envWrap">

<div class="env" onclick="openImg('img1.jpg')"><img src="img1.jpg"></div>
<div class="env" onclick="openImg('img2.jpg')"><img src="img2.jpg"></div>
<div class="env" onclick="openImg('img3.jpg')"><img src="img3.jpg"></div>

</div>

<button class="btn" onclick="go(6)">Next ➡️</button>
</div>

<!-- POPUP -->
<div id="popup">
<img id="popImg">
<button class="btn" onclick="closeImg()">Close</button>
</div>

<!-- PAGE 6 -->
<div id="p6" class="page">
<div class="card">
<h2 class="text-pink-500 text-xl">❤️ I Love You ❤️</h2>
<p>You are my everything 💖</p>
</div>
</div>

<script>

/* PAGE SWITCH */
function go(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");

if(n==3){
setTimeout(()=>go(4),3000);
}
if(n==4){
setTimeout(()=>go(5),3000);
}
}

/* LOGIN */
function login(e){
e.preventDefault();
if(document.getElementById("pass").value==="Sannu"){
go(3);
}else{
alert("Wrong Password");
}
}

/* POPUP */
function openImg(src){
document.getElementById("popup").style.display="flex";
document.getElementById("popImg").src=src;
}
function closeImg(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
