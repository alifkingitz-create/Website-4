<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<title>Love ❤️</title>

<style>

/* ---------- GLOBAL ---------- */
body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
}
.page{
display:none;
width:100%;
height:100vh;
justify-content:center;
align-items:center;
position:absolute;
top:0;
left:0;
flex-direction:column;
}
.active{display:flex;}

/* ---------- SWIPE ---------- */
.swipe{
background:#F1F7F7;
width:200px;
height:60px;
border-radius:60px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
position:relative;
}
.container{
position:absolute;
left:5px;
width:50px;
height:50px;
background:#7AB5B7;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
transition:0.3s;
}
.swipe:hover .container{
left:calc(100% - 55px);
}

/* ---------- LOGIN ---------- */
.form{
background:rgba(0,255,240,0.5);
padding:20px;
border-radius:10px;
display:flex;
flex-direction:column;
gap:10px;
animation:float 2s infinite;
}
@keyframes float{
50%{transform:translateY(20px);}
}

/* ---------- SCANNER ---------- */
.phoneContainer{
width:185px;
height:350px;
background:black;
border-radius:20px;
position:relative;
}
.screen{
width:100%;
height:100%;
position:absolute;
overflow:hidden;
}
.camera{
width:80px;
height:20px;
background:black;
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
border-radius:25px;
animation:cam 2s infinite alternate;
}
@keyframes cam{
50%{width:100px;background:blue;}
}
.scanLine{
width:100%;
height:3px;
background:#00ffcc;
position:absolute;
animation:scan 2s infinite;
}
@keyframes scan{
0%{top:0;}
100%{top:100%;}
}

/* ---------- ENVELOPE ---------- */
.envWrap{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.letter-image{
position:relative;
width:200px;
height:200px;
cursor:pointer;
}

.animated-mail{
position:relative;
width:200px;
height:150px;
transition:0.4s;
}

.body{
position:absolute;
bottom:0;
border-style:solid;
border-width:0 0 100px 200px;
border-color:transparent transparent #e95f55 transparent;
}

.top-fold{
position:absolute;
top:50px;
border-style:solid;
border-width:50px 100px 0 100px;
transform-origin:50% 0%;
transition:0.4s;
border-color:#cf4a43 transparent transparent transparent;
}

.back-fold{
position:absolute;
bottom:0;
width:200px;
height:100px;
background:#cf4a43;
}

.left-fold{
position:absolute;
bottom:0;
border-style:solid;
border-width:50px 0 50px 100px;
border-color:transparent transparent transparent #e15349;
}

.letter{
position:absolute;
left:20px;
bottom:0;
width:160px;
height:60px;
background:white;
overflow:hidden;
transition:0.4s;
z-index:2;
}

.letter img{
width:100%;
height:100%;
object-fit:cover;
}

/* OPEN */
.letter-image.open .animated-mail{
transform:translateY(50px);
}
.letter-image.open .top-fold{
transform:rotateX(180deg);
}
.letter-image.open .letter{
height:180px;
}

/* PHOTO POP OUT */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
width:80%;
max-width:300px;
z-index:100;
transition:0.3s;
}
.popup img{
width:100%;
border-radius:10px;
}
.popup.show{
transform:translate(-50%,-50%) scale(1);
}

/* CLOSE BTN */
.closeBtn{
margin-top:10px;
padding:8px 15px;
background:red;
color:white;
border:none;
border-radius:10px;
}

/* NEXT */
.nextBtn{
margin-top:20px;
padding:10px 20px;
background:#ff4d88;
border:none;
border-radius:20px;
color:white;
}

/* MOBILE */
@media(max-width:600px){
.letter-image{transform:scale(0.8);}
}

</style>
</head>

<body>

<audio id="bgMusic" src="song.mp3" loop></audio>

<!-- PAGE 1 -->
<div id="page1" class="page active">
<div class="swipe" onclick="startMusic();go(2)">
Get Started <span class="container">➡</span>
</div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
<form class="form" onsubmit="login(event)">
<input placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button>Continue</button>
</form>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
<div class="phoneContainer">
<div class="screen">
<div class="camera"></div>
<div class="scanLine"></div>
</div>
</div>
</div>

<!-- PAGE 4 -->
<div id="page4" class="page">
<h1 style="color:white">Loading...</h1>
</div>

<!-- PAGE 5 -->
<div id="page5" class="page">
<div class="envWrap">

<div class="letter-image" onclick="openEnv(this,'img1.jpg')">
<div class="animated-mail">
<div class="back-fold"></div>
<div class="letter"><img src="img1.jpg"></div>
<div class="top-fold"></div>
<div class="body"></div>
<div class="left-fold"></div>
</div>
</div>

<div class="letter-image" onclick="openEnv(this,'img2.jpg')"><div class="animated-mail"><div class="back-fold"></div><div class="letter"><img src="img2.jpg"></div><div class="top-fold"></div><div class="body"></div><div class="left-fold"></div></div></div>

<div class="letter-image" onclick="openEnv(this,'img3.jpg')"><div class="animated-mail"><div class="back-fold"></div><div class="letter"><img src="img3.jpg"></div><div class="top-fold"></div><div class="body"></div><div class="left-fold"></div></div></div>

</div>

<button class="nextBtn" onclick="go(6)">Next ➡️</button>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
<img id="popImg">
<button class="closeBtn" onclick="closePop()">Close</button>
</div>

<!-- PAGE 6 -->
<div id="page6" class="page flex justify-center items-center">
<div class="text-white text-center">
<h1 class="text-2xl text-pink-500">I Love You ❤️</h1>
<p>You are my everything 💖</p>
</div>
</div>

<script>

/* MUSIC */
function startMusic(){
document.getElementById("bgMusic").play().catch(()=>{});
}

/* PAGE */
function go(p){
document.querySelector(".active").classList.remove("active");
document.getElementById("page"+p).classList.add("active");

if(p===3){
setTimeout(()=>go(4),3000);
}
if(p===4){
setTimeout(()=>go(5),4000);
}
}

/* LOGIN */
function login(e){
e.preventDefault();
if(document.getElementById("pass").value==="Sannu"){
go(3);
}else{
alert("Wrong Password");
}
}

/* ENVELOPE */
function openEnv(el,img){
el.classList.add("open");

setTimeout(()=>{
document.getElementById("popImg").src=img;
document.getElementById("popup").classList.add("show");
},500);
}

function closePop(){
document.getElementById("popup").classList.remove("show");
document.querySelectorAll(".letter-image").forEach(e=>e.classList.remove("open"));
}

</script>

</body>
</html>
