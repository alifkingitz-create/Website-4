<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love ❤️</title>

<style>

/* RESET */
body,html{
margin:0;
padding:0;
background:black;
color:white;
font-family:sans-serif;
overflow:hidden;
}

/* PAGE SYSTEM */
.page{
display:none;
height:100vh;
width:100%;
justify-content:center;
align-items:center;
flex-direction:column;
}

.page.active{
display:flex;
animation:fade 0.5s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* ===== HOME ===== */
.swipe{
background:white;
color:black;
padding:15px 30px;
border-radius:50px;
cursor:pointer;
}

/* ===== LOGIN ===== */
.form{
display:flex;
flex-direction:column;
gap:10px;
}

.form-content{
padding:10px;
border-radius:10px;
border:none;
}

/* ===== SCANNER ===== */
.phoneContainer{
width:200px;
height:350px;
background:black;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
}

.scan{
width:150px;
height:200px;
border:2px solid cyan;
position:relative;
overflow:hidden;
}

.line{
height:3px;
width:100%;
background:red;
position:absolute;
animation:scan 2s infinite;
}

@keyframes scan{
0%{top:0}
100%{top:100%}
}

/* ===== LOADING ===== */
.loader{
font-size:30px;
animation:blink 1s infinite;
}
@keyframes blink{
50%{opacity:0}
}

/* ===== ENVELOPE (EXACT FIXED) ===== */
.envContainer{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.letter-image{
position:relative;
width:200px;
height:200px;
cursor:pointer;
}

.animated-mail{
position:relative;
height:150px;
width:200px;
transition:0.4s;
}

.animated-mail .body{
position:absolute;
bottom:0;
border-style:solid;
border-width:0 0 100px 200px;
border-color:transparent transparent #e95f55 transparent;
}

.animated-mail .top-fold{
position:absolute;
top:50px;
border-style:solid;
border-width:50px 100px 0 100px;
transform-origin:50% 0%;
transition:0.4s;
border-color:#cf4a43 transparent transparent transparent;
}

.animated-mail .back-fold{
position:absolute;
bottom:0;
width:200px;
height:100px;
background:#cf4a43;
}

.animated-mail .left-fold{
position:absolute;
bottom:0;
border-style:solid;
border-width:50px 0 50px 100px;
border-color:transparent transparent transparent #e15349;
}

.animated-mail .letter{
position:absolute;
left:20px;
bottom:0;
width:160px;
height:60px;
background:white;
overflow:hidden;
transition:0.4s;
}

.animated-mail .letter img{
width:100%;
height:100%;
object-fit:cover;
}

/* HOVER / CLICK */
.letter-image:hover .animated-mail,
.letter-image.open .animated-mail{
transform:translateY(50px);
}

.letter-image:hover .top-fold,
.letter-image.open .top-fold{
transform:rotateX(180deg);
}

.letter-image:hover .letter,
.letter-image.open .letter{
height:180px;
}

/* ===== LAST ===== */
.card{
background:white;
color:black;
padding:20px;
border-radius:20px;
}

/* MOBILE */
@media(max-width:600px){
.letter-image{
transform:scale(0.8);
}
}

</style>
</head>

<body>

<audio src="song.mp3" autoplay loop id="music"></audio>

<!-- PAGE 1 -->
<div id="p1" class="page active">
<div class="swipe" onclick="go(2)">Get Started</div>
</div>

<!-- PAGE 2 -->
<div id="p2" class="page">
<div class="form">
<input class="form-content" placeholder="Username">
<input id="pass" class="form-content" type="password" placeholder="Password">
<button onclick="login()">Continue</button>
</div>
</div>

<!-- PAGE 3 -->
<div id="p3" class="page">
<div class="phoneContainer">
<div class="scan">
<div class="line"></div>
</div>
</div>
</div>

<!-- PAGE 4 -->
<div id="p4" class="page">
<div class="loader">Loading...</div>
</div>

<!-- PAGE 5 -->
<div id="p5" class="page">
<div class="envContainer">

<div class="letter-image"><div class="animated-mail"><div class="back-fold"></div><div class="letter"><img src="img1.jpg"></div><div class="top-fold"></div><div class="body"></div><div class="left-fold"></div></div></div>

<div class="letter-image"><div class="animated-mail"><div class="back-fold"></div><div class="letter"><img src="img2.jpg"></div><div class="top-fold"></div><div class="body"></div><div class="left-fold"></div></div></div>

<div class="letter-image"><div class="animated-mail"><div class="back-fold"></div><div class="letter"><img src="img3.jpg"></div><div class="top-fold"></div><div class="body"></div><div class="left-fold"></div></div></div>

</div>

<button onclick="go(6)">Next ➡️</button>
</div>

<!-- PAGE 6 -->
<div id="p6" class="page">
<div class="card">
<h2>❤️ Thank You ❤️</h2>
</div>
</div>

<script>

function go(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");
}

/* login */
function login(){
let p=document.getElementById("pass").value;

if(p==="Sannu"){
go(3);
setTimeout(()=>go(4),3000);
setTimeout(()=>go(5),7000);
}else{
alert("Wrong Password");
}
}

/* mobile click */
document.querySelectorAll(".letter-image").forEach(el=>{
el.addEventListener("click",function(){
this.classList.toggle("open");
});
});

/* autoplay fix */
document.body.addEventListener("click",()=>{
document.getElementById("music").play();
},{once:true});

</script>

</body>
</html>
