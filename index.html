<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love ❤️</title>

<style>
body{
  margin:0;
  background:black;
  font-family:sans-serif;
  overflow:hidden;
}
.page{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
.active{display:flex;}

/* BUTTON */
.btn{
  padding:15px 30px;
  background:#ff4d88;
  color:white;
  border:none;
  border-radius:30px;
  font-size:18px;
}

/* LOGIN */
input{
  margin:10px;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* SCANNER */
.phone{
  width:200px;
  height:350px;
  background:black;
  border-radius:20px;
  overflow:hidden;
}
video{
  width:100%;
  height:100%;
  object-fit:cover;
}
.scan{
  height:3px;
  background:#00ffcc;
  animation:scan 2s infinite;
}
@keyframes scan{
  0%{transform:translateY(0);}
  100%{transform:translateY(340px);}
}

/* ENVELOPE */
.grid{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
}
.env{
  width:120px;
  height:80px;
  background:white;
  overflow:hidden;
  border-radius:10px;
}
.env img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PHOTO VIEW */
#viewer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
#viewer img{
  max-width:90%;
  border-radius:10px;
}
</style>
</head>

<body>

<audio id="music" src="song.mp3" loop></audio>

<!-- PAGE 1 -->
<div id="p1" class="page active">
  <button class="btn" onclick="start()">Start ❤️</button>
</div>

<!-- LOGIN -->
<div id="p2" class="page">
  <input id="pass" type="password" placeholder="Password">
  <button class="btn" onclick="login()">Continue</button>
</div>

<!-- SCANNER -->
<div id="p3" class="page">
  <div class="phone">
    <video id="cam" autoplay playsinline></video>
    <div class="scan"></div>
  </div>
</div>

<!-- LOADING -->
<div id="p4" class="page">
  <h2 style="color:white;">Loading...</h2>
</div>

<!-- ENVELOPE -->
<div id="p5" class="page">
  <div class="grid">
    <div class="env" onclick="openImg('img1.jpg')"><img src="img1.jpg"></div>
    <div class="env" onclick="openImg('img2.jpg')"><img src="img2.jpg"></div>
    <div class="env" onclick="openImg('img3.jpg')"><img src="img3.jpg"></div>
    <div class="env" onclick="openImg('img4.jpg')"><img src="img4.jpg"></div>
    <div class="env" onclick="openImg('img5.jpg')"><img src="img5.jpg"></div>
  </div>

  <button class="btn" onclick="go(6)">Next ❤️</button>
</div>

<!-- VIEWER -->
<div id="viewer">
  <img id="big">
  <button class="btn" onclick="closeImg()">Close 💌</button>
</div>

<!-- FINAL -->
<div id="p6" class="page">
  <h1 style="color:#ff4d88;">I Love You ❤️</h1>
  <p style="color:white;">You are my everything 💖</p>
</div>

<script>

function go(n){
  document.querySelector(".active").classList.remove("active");
  document.getElementById("p"+n).classList.add("active");
}

/* START */
function start(){
  document.getElementById("music").play().catch(()=>{});
  go(2);
}

/* LOGIN */
function login(){
  if(document.getElementById("pass").value==="Sannu"){
    go(3);
    startCam();
  }else{
    alert("Wrong Password");
  }
}

/* CAMERA */
function startCam(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(s=>{
    cam.srcObject=s;
    setTimeout(()=>go(4),3000);
    setTimeout(()=>go(5),7000);
  })
  .catch(()=>{
    alert("Camera allow koro");
  });
}

/* IMAGE */
function openImg(src){
  viewer.style.display="flex";
  big.src=src;
}
function closeImg(){
  viewer.style.display="none";
}

</script>

</body>
</html>
