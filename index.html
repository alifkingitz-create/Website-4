<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Website ❤️</title>

<style>

/* RESET */
body,html{
margin:0;
padding:0;
font-family:sans-serif;
overflow:hidden;
background:black;
color:white;
}

/* PAGE SYSTEM */
.page{
display:none;
height:100vh;
width:100%;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{display:flex;}

/* ================= HOME ================= */
.swipe{
background:#fff;
color:black;
padding:15px 30px;
border-radius:50px;
cursor:pointer;
}

/* ================= LOGIN ================= */
.form{
display:flex;
flex-direction:column;
gap:10px;
}

input{
padding:10px;
border-radius:10px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

/* ================= SCANNER ================= */
.phone{
width:200px;
height:350px;
background:#111;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.scan{
width:150px;
height:200px;
border:2px solid cyan;
position:relative;
overflow:hidden;
}

.line{
height:3px;
width:100%;
background:red;
position:absolute;
animation:scan 2s infinite;
}

@keyframes scan{
0%{top:0}
100%{top:100%}
}

/* ================= LOADING ================= */
.loader{
font-size:30px;
animation:blink 1s infinite;
}
@keyframes blink{
50%{opacity:0}
}

/* ================= ENVELOPE ================= */
.envContainer{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.letter-image{
position:relative;
width:150px;
height:150px;
cursor:pointer;
}

.animated-mail{
position:relative;
width:150px;
height:100px;
}

.body{
position:absolute;
bottom:0;
border-width:0 0 80px 150px;
border-style:solid;
border-color:transparent transparent #e95f55 transparent;
}

.top-fold{
position:absolute;
top:40px;
border-width:40px 75px 0 75px;
border-style:solid;
border-color:#cf4a43 transparent transparent transparent;
transform-origin:top;
transition:0.5s;
}

.back-fold{
position:absolute;
bottom:0;
width:150px;
height:80px;
background:#cf4a43;
}

.left-fold{
position:absolute;
bottom:0;
border-width:40px 0 40px 75px;
border-style:solid;
border-color:transparent transparent transparent #e15349;
}

.letter{
position:absolute;
width:110px;
height:60px;
background:white;
left:20px;
bottom:0;
overflow:hidden;
transition:0.5s;
}

.letter img{
width:100%;
height:100%;
object-fit:cover;
}

.letter-image.open .top-fold{
transform:rotateX(180deg);
}

.letter-image.open .letter{
height:120px;
}

.insideBtn{
position:absolute;
bottom:-40px;
left:50%;
transform:translateX(-50%);
display:none;
background:pink;
}

.letter-image.open .insideBtn{
display:block;
}

.nextBtn{
margin-top:20px;
background:hotpink;
}

/* ================= LAST ================= */
.card{
background:white;
color:black;
padding:30px;
border-radius:20px;
text-align:center;
}

</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="music" src="song.mp3" autoplay loop></audio>

<!-- ================= PAGE 1 ================= -->
<div id="p1" class="page active">
<div class="swipe" onclick="go(2)">Get Started</div>
</div>

<!-- ================= PAGE 2 LOGIN ================= -->
<div id="p2" class="page">
<div class="form">
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Continue</button>
</div>
</div>

<!-- ================= PAGE 3 SCAN ================= -->
<div id="p3" class="page">
<div class="phone">
<div class="scan">
<div class="line"></div>
</div>
<p>Scanning...</p>
</div>
</div>

<!-- ================= PAGE 4 LOADING ================= -->
<div id="p4" class="page">
<div class="loader">Loading...</div>
</div>

<!-- ================= PAGE 5 ENVELOPE ================= -->
<div id="p5" class="page">

<div class="envContainer">

<!-- 5 envelopes -->
<div class="letter-image">
<div class="animated-mail">
<div class="back-fold"></div>
<div class="letter"><img src="img1.jpg"></div>
<div class="top-fold"></div>
<div class="body"></div>
<div class="left-fold"></div>
</div>
<button class="insideBtn" onclick="closeOne(this)">Close</button>
</div>

<div class="letter-image">
<div class="animated-mail">
<div class="back-fold"></div>
<div class="letter"><img src="img2.jpg"></div>
<div class="top-fold"></div>
<div class="body"></div>
<div class="left-fold"></div>
</div>
<button class="insideBtn" onclick="closeOne(this)">Close</button>
</div>

<div class="letter-image">
<div class="animated-mail">
<div class="back-fold"></div>
<div class="letter"><img src="img3.jpg"></div>
<div class="top-fold"></div>
<div class="body"></div>
<div class="left-fold"></div>
</div>
<button class="insideBtn" onclick="closeOne(this)">Close</button>
</div>

<div class="letter-image">
<div class="animated-mail">
<div class="back-fold"></div>
<div class="letter"><img src="img4.jpg"></div>
<div class="top-fold"></div>
<div class="body"></div>
<div class="left-fold"></div>
</div>
<button class="insideBtn" onclick="closeOne(this)">Close</button>
</div>

<div class="letter-image">
<div class="animated-mail">
<div class="back-fold"></div>
<div class="letter"><img src="img5.jpg"></div>
<div class="top-fold"></div>
<div class="body"></div>
<div class="left-fold"></div>
</div>
<button class="insideBtn" onclick="closeOne(this)">Close</button>
</div>

</div>

<button class="nextBtn" onclick="go(6)">Next ➡️</button>

</div>

<!-- ================= PAGE 6 LAST ================= -->
<div id="p6" class="page">
<div class="card">
<h2>❤️ Thank You ❤️</h2>
<p>Tumi amar life er best part 💖</p>
</div>
</div>

<script>

/* PAGE CHANGE */
function go(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");
}

/* LOGIN */
function login(){
let p=document.getElementById("pass").value;
if(p==="Sannu"){
go(3);

/* scan 3 sec */
setTimeout(()=>go(4),3000);

/* loading 4 sec */
setTimeout(()=>go(5),7000);

}else{
alert("Wrong Password");
}
}

/* ENVELOPE OPEN */
document.querySelectorAll(".letter-image").forEach(el=>{
el.addEventListener("click",function(e){
if(e.target.tagName==="BUTTON") return;
this.classList.add("open");
});
});

/* CLOSE ONE */
function closeOne(btn){
btn.parentElement.classList.remove("open");
}

/* AUTO PLAY FIX */
document.body.addEventListener("click",()=>{
document.getElementById("music").play();
},{once:true});

</script>

</body>
</html>
